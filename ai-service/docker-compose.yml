# 仅用于本地启动 RAG 所需的向量数据库（Qdrant）。
# ai-service 本身仍以 `uvicorn main:app` 方式启动，不在本文件中编排。
#
# 使用方法：
#   cd ai-service
#   docker compose up -d qdrant
#   # 访问 http://localhost:6333/dashboard 可看 Web 控制台
#
# 关闭：
#   docker compose down

services:
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: mental-health-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP / REST + Web UI
      - "6334:6334"   # gRPC（启用 QDRANT_PREFER_GRPC=true 时使用）
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      # 生产可在此设置 API Key：QDRANT__SERVICE__API_KEY: "your-api-key"
      QDRANT__LOG_LEVEL: INFO

volumes:
  qdrant_storage:
    name: mental-health-qdrant-storage
